<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      * {
        margin: 0;
        padding: 0;
        font-family:
          "Franklin Gothic Medium", "Arial Narrow", Arial, sans-serif;
      }

      .container {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        flex-wrap: wrap;
        flex-grow: 1;
        gap: 15px;
        margin-top: 15px;
      }

      .boxes {
        display: flex;
        flex-direction: row;
        justify-content: center;
        align-items: center;
        gap: 15px;
        flex-wrap: wrap;
      }

      .box {
        width: 250px;
        height: 250px;
        border: 2px solid #000;
        border-radius: 5px;
      }
    </style>
    <title>Playground</title>
  </head>
  <body>
    <div class="container">
      <h1>Welcome!</h1>
      <div class="boxes">
        {% for i in range(times) %}
        <div class="box" style="background-color: {{ color }};"></div>
        {% endfor %}
      </div>
    </div>
  </body>
</html>
